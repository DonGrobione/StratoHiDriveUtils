name: Create PowerShell Release

on:
  push:
    branches: [main]
  
permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Read version and commit message
        id: meta
        shell: pwsh
        run: |
          $version = (Import-PowerShellDataFile 'StratoHiDriveUtils.psd1').ModuleVersion
          $commitMsg = git log -1 --pretty=%s
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "commit_msg=$commitMsg" >> $env:GITHUB_OUTPUT

      - name: Create ZIP
        id: create_zip
        shell: bash
        run: |
          ZIP_NAME="StratoHiDriveUtils-${{ steps.meta.outputs.version }}.zip"
          git ls-files ':!/.github/**' ':!/.gitignore' > files_to_zip.txt
          if [ ! -s files_to_zip.txt ]; then
            echo "No files to archive."
            exit 1
          fi
          zip -r "$ZIP_NAME" -@ < files_to_zip.txt
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          body: ${{ steps.meta.outputs.commit_msg }}
          files: ${{ steps.create_zip.outputs.zip_name }}

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ github.sha }}
          path: ${{ steps.create_zip.outputs.zip_name }}